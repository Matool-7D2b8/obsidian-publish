name: Deploy Obsidian to Server

on:
  workflow_dispatch:  # Manual trigger from GitHub UI
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Quartz config
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Sync Data_Struct vault
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          git clone --depth 1 https://oauth2:$GH_TOKEN@github.com/125860197/DS_note.git /tmp/ds
          mkdir -p content/Data_Struct
          cp -r /tmp/ds/DS/. content/Data_Struct/
          rm -rf /tmp/ds

      - name: Sync Math_note vault
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          git clone --depth 1 https://oauth2:$GH_TOKEN@github.com/125860197/Math_note.git /tmp/math
          mkdir -p content/Math_note
          cp -r /tmp/math/Math/. content/Math_note/
          rm -rf /tmp/math

      - name: Sync En_learn vault
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          git clone --depth 1 https://oauth2:$GH_TOKEN@github.com/125860197/En_word.git /tmp/en
          mkdir -p content/En_learn
          cp /tmp/en/*.md content/En_learn/ 2>/dev/null || true
          rm -rf /tmp/en

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npx quartz build

      - name: Deploy to Alibaba Cloud
        uses: easingthemes/ssh-deploy@v6
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
          REMOTE_USER: ${{ secrets.REMOTE_USER }}
          SOURCE: "public/"
          TARGET: "/var/www/obsidian/"
          EXCLUDE: ".git"
