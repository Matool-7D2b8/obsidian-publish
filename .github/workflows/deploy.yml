name: Deploy Obsidian to Server

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"   # Auto-build every 15 minutes
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Quartz config
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Sync Data_Struct vault
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          git clone --depth 1 https://oauth2:$GH_TOKEN@github.com/125860197/DS_note.git /tmp/ds
          mkdir -p content/Data_Struct
          for sub in DS CN CO OS; do
            [ -d "/tmp/ds/$sub" ] && cp -r "/tmp/ds/$sub/." "content/Data_Struct/$sub/"
          done
          rm -rf /tmp/ds

      - name: Sync Math_note vault
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          git clone --depth 1 https://oauth2:$GH_TOKEN@github.com/125860197/Math_note.git /tmp/math
          mkdir -p content/Math_note
          cp -r /tmp/math/Math/. content/Math_note/
          rm -rf /tmp/math

      - name: Sync En_learn vault
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          git clone --depth 1 https://oauth2:$GH_TOKEN@github.com/125860197/En_word.git /tmp/en
          mkdir -p content/En_learn
          cp /tmp/en/*.md content/En_learn/ 2>/dev/null || true
          rm -rf /tmp/en

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npx quartz build

      - name: Deploy to Alibaba Cloud
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
          REMOTE_USER: ${{ secrets.REMOTE_USER }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -p 22222" \
            public/ ${REMOTE_USER}@${REMOTE_HOST}:/var/www/obsidian/
