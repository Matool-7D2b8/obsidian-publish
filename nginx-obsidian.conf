# Nginx configuration for Obsidian Quartz site
# Place this file at /etc/nginx/sites-available/obsidian
# Then: sudo ln -s /etc/nginx/sites-available/obsidian /etc/nginx/sites-enabled/
#       sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80 default_server;
    listen [::]:80 default_server;

    root /var/www/obsidian;
    index index.html;

    server_name _;

    # Enable gzip
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml text/javascript image/svg+xml;

    location / {
        # Quartz generates flat HTML files; try exact match, then .html, then directory index
        try_files $uri $uri.html $uri/ =404;
    }

    # Cache static assets for 30 days
    location /static/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Cache images for 7 days
    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp)$ {
        expires 7d;
        add_header Cache-Control "public";
    }
}
